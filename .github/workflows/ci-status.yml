name: CI Status

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    # Roda todo dia às 06:00 UTC para manter o badge sempre atualizado
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: ci-status-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────
  # 1. Build Web (Kotlin/JS)
  # ─────────────────────────────────────────
  build-web:
    name: 🌐 Build Web (Kotlin/JS)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'
          cache-read-only: false

      - name: Build produção (Kotlin/JS → webpack)
        run: gradle jsBrowserProductionWebpack --no-daemon --stacktrace

      - name: Upload artefato web
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: build/dist/js/productionExecutable/
          retention-days: 1

  # ─────────────────────────────────────────
  # 2. Build Android (debug + release)
  # ─────────────────────────────────────────
  build-android:
    name: 🤖 Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Permissão do gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: cd android && ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  # ─────────────────────────────────────────
  # 3. Build Docker Image
  # ─────────────────────────────────────────
  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: build-web

    permissions:
      contents: read
      packages: write

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artefato web
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: build/dist/js/productionExecutable/

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login no GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extrair metadados Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}
            type=ref,event=pr
            type=sha,prefix=sha-,format=short

      - name: Build (e push se não for PR)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # 4. Smoke Test (apenas em push/schedule)
  # ─────────────────────────────────────────
  smoke-test:
    name: 🔥 Smoke Test
    runs-on: ubuntu-latest
    needs: build-docker
    if: github.event_name != 'pull_request'

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull e testar container
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest"
          docker pull "$IMAGE"
          docker run -d --name sonix-smoke -p 8080:80 "$IMAGE"
          sleep 5

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/)
          echo "HTTP Status: $HTTP_STATUS"

          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Smoke test FALHOU — HTTP $HTTP_STATUS"
            docker logs sonix-smoke
            exit 1
          fi

          echo "✅ Smoke test PASSOU"
          docker rm -f sonix-smoke

  # ─────────────────────────────────────────
  # 5. Status Final (agrega todos os jobs)
  # ─────────────────────────────────────────
  status:
    name: ✅ Status CI
    runs-on: ubuntu-latest
    needs: [build-web, build-android, build-docker]
    if: always()

    steps:
      - name: Verificar resultado dos jobs
        run: |
          echo "build-web:     ${{ needs.build-web.result }}"
          echo "build-android: ${{ needs.build-android.result }}"
          echo "build-docker:  ${{ needs.build-docker.result }}"

          if [[ "${{ needs.build-web.result }}"     != "success" ]] || \
             [[ "${{ needs.build-android.result }}" != "success" ]] || \
             [[ "${{ needs.build-docker.result }}"  != "success" ]]; then
            echo "❌ Um ou mais jobs falharam."
            exit 1
          fi

          echo "✅ Todos os jobs passaram com sucesso!"
