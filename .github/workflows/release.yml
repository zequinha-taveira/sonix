name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'gradle'

    - name: Make Gradlew Executable
      run: chmod +x android/gradlew

    - name: Build Release APK
      run: |
        cd android
        ./gradlew assembleRelease --no-daemon

    - name: Build Debug APK
      run: |
        cd android
        ./gradlew assembleDebug --no-daemon

    - name: Get Tag Name
      id: tag
      run: echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

    - name: Generate Release Notes
      id: notes
      run: |
        # Get the previous tag, if any
        PREV_TAG=$(git tag --sort=-v:refname | head -n 2 | tail -n 1)
        if [ "$PREV_TAG" != "${{ steps.tag.outputs.version }}" ] && [ -n "$PREV_TAG" ]; then
          COMMITS=$(git log --oneline "$PREV_TAG"..HEAD)
        else
          COMMITS=$(git log --oneline)
        fi

        {
          echo "notes<<EOF"
          echo "## What's Changed"
          echo ""
          echo "$COMMITS" | while read -r line; do
            echo "- $line"
          done
          echo ""
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ steps.tag.outputs.version }}"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v3
      with:
        name: "Sonix ${{ steps.tag.outputs.version }}"
        body: ${{ steps.notes.outputs.notes }}
        draft: false
        prerelease: false
        files: |
          android/app/build/outputs/apk/release/*.apk
          android/app/build/outputs/apk/debug/*.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
