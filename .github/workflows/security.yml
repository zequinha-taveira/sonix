name: Security

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 7 * * 1'   # toda segunda-feira às 07:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  security-events: write   # upload SARIF → aba Security do GitHub
  actions: read
  packages: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ══════════════════════════════════════════════════════════════
  # 1. CODEQL — análise estática do código Kotlin
  # ══════════════════════════════════════════════════════════════
  codeql:
    name: 🔬 CodeQL (Kotlin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Inicializar CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          # security-and-quality cobre OWASP Top 10 + code smells
          queries: security-and-quality

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'
          cache-read-only: false

      - name: Build Kotlin/JS (para CodeQL indexar)
        run: gradle jsBrowserProductionWebpack --no-daemon --stacktrace
        continue-on-error: true

      - name: Build Android (para CodeQL indexar)
        run: chmod +x android/gradlew && cd android && ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: Executar análise CodeQL
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:java-kotlin"
          upload: always

  # ══════════════════════════════════════════════════════════════
  # 2. DEPENDENCY REVIEW — bloqueia PRs com deps vulneráveis
  # ══════════════════════════════════════════════════════════════
  dependency-review:
    name: 📦 Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high          # bloqueia HIGH e CRITICAL
          deny-licenses: GPL-2.0, AGPL-3.0
          comment-summary-in-pr: always   # resume o resultado direto no PR

  # ══════════════════════════════════════════════════════════════
  # 3. OSSAR — análise estática de segurança (OWASP, bandit, etc.)
  # ══════════════════════════════════════════════════════════════
  ossar:
    name: 🛡️ OSSAR (OWASP)
    runs-on: windows-latest          # OSSAR exige Windows

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Executar OSSAR
        uses: github/ossar-action@v1
        id: ossar

      - name: Upload resultado OSSAR
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ steps.ossar.outputs.sarifFile }}
          category: ossar

  # ══════════════════════════════════════════════════════════════
  # 4. GITLEAKS — detecção de secrets/tokens no histórico git
  # ══════════════════════════════════════════════════════════════
  gitleaks:
    name: 🔑 Gitleaks (Secrets)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout (histórico completo)
        uses: actions/checkout@v5
        with:
          fetch-depth: 0     # necessário para varrer todo o histórico

      - name: Scan de secrets com Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}   # opcional (plano free funciona sem)

  # ══════════════════════════════════════════════════════════════
  # 5. TRIVY — vulnerabilidades na imagem Docker
  # ══════════════════════════════════════════════════════════════
  trivy-docker:
    name: 🐳 Trivy (Docker Image)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle 8.5
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.5'

      - name: Build Kotlin/JS
        run: gradle jsBrowserProductionWebpack --no-daemon
        continue-on-error: true

      - name: Build Docker image local
        run: docker build -t sonix:security-scan .

      - name: Trivy — scan da imagem (tabela no log)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sonix:security-scan'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Trivy — scan da imagem (SARIF para Security tab)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'sonix:security-scan'
          format: 'sarif'
          output: 'trivy-docker.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload SARIF ao GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-docker.sarif'
          category: trivy-docker

  # ══════════════════════════════════════════════════════════════
  # 6. TRIVY — scan do repositório (IaC + filesystem + configs)
  # ══════════════════════════════════════════════════════════════
  trivy-repo:
    name: 🗂️ Trivy (Repo / IaC)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Trivy — scan do repositório (tabela no log)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          # detecta: vuln (deps), secret (tokens), misconfig (IaC)
          scanners: 'vuln,secret,misconfig'

      - name: Trivy — scan do repositório (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-repo.sarif'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'
          scanners: 'vuln,secret,misconfig'

      - name: Upload SARIF ao GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-repo.sarif'
          category: trivy-repo

  # ══════════════════════════════════════════════════════════════
  # 7. ANDROID LINT — lint de segurança no módulo Android
  # ══════════════════════════════════════════════════════════════
  android-lint:
    name: 🤖 Android Lint (Security)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Permissão do gradlew
        run: chmod +x android/gradlew

      - name: Executar Android Lint
        run: cd android && ./gradlew lint --no-daemon
        continue-on-error: true

      - name: Upload relatório Lint
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: android-lint-report
          path: |
            android/app/build/reports/lint-results*.html
            android/app/build/reports/lint-results*.xml
          retention-days: 14

  # ══════════════════════════════════════════════════════════════
  # 8. STATUS FINAL — agrega todos os scans
  # ══════════════════════════════════════════════════════════════
  security-status:
    name: 🔒 Security Status
    runs-on: ubuntu-latest
    needs:
      - codeql
      - ossar
      - gitleaks
      - trivy-docker
      - trivy-repo
      - android-lint
    if: always()

    steps:
      - name: Avaliar resultado de todos os scans
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  Sonix — Security Scan Summary"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  codeql:        ${{ needs.codeql.result }}"
          echo "  ossar:         ${{ needs.ossar.result }}"
          echo "  gitleaks:      ${{ needs.gitleaks.result }}"
          echo "  trivy-docker:  ${{ needs.trivy-docker.result }}"
          echo "  trivy-repo:    ${{ needs.trivy-repo.result }}"
          echo "  android-lint:  ${{ needs.android-lint.result }}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

          FAILED=0
          for result in \
            "${{ needs.codeql.result }}" \
            "${{ needs.ossar.result }}" \
            "${{ needs.gitleaks.result }}" \
            "${{ needs.trivy-docker.result }}" \
            "${{ needs.trivy-repo.result }}" \
            "${{ needs.android-lint.result }}"; do
            if [[ "$result" == "failure" ]]; then
              FAILED=1
            fi
          done

          if [[ "$FAILED" == "1" ]]; then
            echo "❌ Um ou mais scans de segurança falharam."
            echo "   Verifique a aba Security → Code scanning para detalhes."
            exit 1
          fi

          echo "✅ Todos os scans de segurança concluídos com sucesso."
